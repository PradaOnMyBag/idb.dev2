    <script type="22b71fe32b358860fe5f6b6e-module">
        "use strict";
        
        import { AudioMotionAnalyzer } from "https://cdn.skypack.dev/audiomotion-analyzer?min";
        
        Array.prototype.shuffle = function() {
            for (let i = this.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [this[i], this[j]] = [this[j], this[i]];
            }
            return this;
        };
        
        $(document).ready(function() {
            let alreadyClicked = false;
        
            async function fetchData(url) {
                const response = await fetch(url);
                return await response.json();
            }
        
            async function initialize() {
                const [data, userData] = await Promise.all([
                    fetchData("assets/storage.json"),
                    fetchData("https://ib2.dev/fetch.php?user=pew")
                ]);
                
                const video = document.getElementById("backgroundVideo");
                const music = document.getElementById("backgroundMusic");
                const storedSongs = data.songs;
                const storedVideos = data.videos;
                const strings = data.strings.shuffle();
        
                function playRandomVideo() {
                    //const randomVideo = storedVideos[Math.floor(Math.random() * storedVideos.length)];
                    //video.src = `assets/videos/${randomVideo}.mp4`;
                    video.volume = 0;
                    video.muted = true;
                    video.play();
                }
        
                let lastSong = null;
                function playRandomSong() {
                    let randomSong;
                    do {
                        randomSong = storedSongs[Math.floor(Math.random() * storedSongs.length)];
                    } while (storedSongs.length > 1 && randomSong === lastSong);
        
                    lastSong = randomSong;
                    music.src = `assets/music/${randomSong}.mp3`;
                    music.volume = $("#volumeSlider").val();
        
                    if (!music.muted) {
                        music.play();
                    }
        
                    $("#songTitle").text(randomSong);
                }
        
                function playRandomMedia() {
                    //playRandomVideo();
                    playRandomSong();
                }
                
                music.addEventListener("ended", playRandomSong);
        
                $("#avatar").attr("src", userData.avatar);
                const displayName = (/[^a-zA-Z0-9]/.test(userData.global_name) || userData.global_name.length > 15) 
                    ? userData.username 
                    : userData.global_name;
                $("#displayName").text(displayName);
                $("#userId").text(userData.id);
                
                if (userData["avatar_decoration_data"] != null) {
                    $("#avatarDecoration").attr("src", `https://cdn.discordapp.com/avatar-decoration-presets/${userData["avatar_decoration_data"]["asset"]}.png?size=96&passthrough=true`)
                } else {
                    document.getElementById("avatarDecoration").style.opacity = 0; //.attr("opacity", 0)
                }
                
                music.load();
                //video.load();
        
                const audioContext = new AudioContext();
                const audioMotion = new AudioMotionAnalyzer(
                    document.getElementById("visualizer"),
                    {
                        height: 0,
                        ansiBands: false,
                        showScaleX: false,
                        bgAlpha: 0,
                        overlay: true,
                        mode: 10,
                        frequencyScale: "log",
                        radial: false,
                        showPeaks: false,
                        channelLayout: "stereo",
                        smoothing: 0.9,
                        fadePeaks: true,
                        fftSize: 4096,
                        maxFreq: 16000,
                        mirror: 0,
                        maxFPS: 60,
                        gradient: "prism",
                        linearAmplitude: true,
                        linearBoost: 1.5,
                        lineWidth: 2,
                        historyLength: 0
                    }
                );
                audioMotion.connectInput(music);
        
                const muteButton = $("#muteButton");
                const volumeSlider = $("#volumeSlider");
                let lastVolume = 0.1;
        
                muteButton.on("click", function() {
                    music.muted = !music.muted;
                    if (music.muted) {
                        music.pause();
                        volumeSlider.val(0);
                        muteButton.removeClass("fa-volume-high").addClass("fa-volume-xmark");
                        tooltips[this.id].setContent("Unmute");
                    } else {
                        music.play();
                        volumeSlider.val(lastVolume);
                        music.volume = lastVolume;
                        muteButton.removeClass("fa-volume-xmark").addClass("fa-volume-high");
                        tooltips[this.id].setContent("Mute");
                    }
                });
        
                volumeSlider.on("input", function() {
                    const volume = parseFloat($(this).val());
                    music.volume = volume;
        
                    if (volume > 0) {
                        lastVolume = volume;
                        if (music.muted) {
                            music.muted = false;
                            music.play();
                            muteButton.removeClass("fa-volume-xmark").addClass("fa-volume-high");
                            tooltips["muteButton"].setContent("Mute");
                        }
                    } else if (volume === 0 && !music.muted) {
                        music.muted = true;
                        music.pause();
                        muteButton.removeClass("fa-volume-high").addClass("fa-volume-xmark");
                        tooltips["muteButton"].setContent("Unmute");
                    }
                });
                
                /*pauseButton.click(function() {
                    const isPaused = video.paused;
                  
                    video[isPaused ? "play" : "pause"]();
                    if (!music.muted)
                        music[isPaused ? "play" : "pause"]();
                  
                    pauseButton.toggleClass("fa-play fa-pause");
                    tooltips[this.id].setContent(isPaused ? "Pause" : "Play");
                });*/
        
                const tooltips = {};
                $("[data-tooltip]").each(function() {
                    tooltips[this.id] = tippy(this, {
                        content: $(this).data("tooltip"),
                        placement: "top",
                        animation: "shift-away",
                    });
                });
        
                tooltips["viewCounter"].setContent(data.viewCount.toLocaleString());
        
                let docInt = 0;
                let deleting = false;
                const docTitle = document.title;
                setInterval(() => {
                    document.title = docTitle.substring(0, docInt);
                    deleting ? docInt-- : docInt++;
                    if (docInt > docTitle.length) {
                        deleting = true;
                    }
                    if (docInt === 1) {
                        deleting = false;
                    }
                }, 500);
        
                $("#currentYear").text(new Date().getFullYear());
        
                $("#landingPage").on("click", function() {
                    if (alreadyClicked) return;
                    alreadyClicked = true;
        
                    audioContext.resume();
                    playRandomMedia();
                    
                    $("#songTitle").on("click", playRandomSong);
        
                    $(".enter-prompt").addClass("slide-out2").on("transitionend", function() {
                        $(this).addClass("hidden2");
                    });
        
                    $(this).addClass("slide-out").on("animationend", function() {
                        $(this).addClass("hidden");
                    });
        
                    $("#mainContent").removeClass("hidden").addClass("visible");
        
                    new TypeIt("#typedText", {
                        strings: strings,
                        speed: 150,
                        lifeLike: true,
                        breakLines: false,
                        loop: true,
                        nextStringDelay: 500,
                        cursorChar: "|",
                        cursorSpeed: 1000
                    }).go();
        
                    const heartBox = document.getElementById("heartBox");
                    if (!heartBox) return;
                        
                    const heartIcon = document.querySelector(".heart-icon-container");
                    const cssAnimation = `
                        @keyframes gentle-wiggle {
                            0%, 100% { transform: rotate(0deg) scale(1); }
                            20% { transform: rotate(-4deg) scale(1.02); }
                            40% { transform: rotate(4deg) scale(1.02); }
                            60% { transform: rotate(-2deg) scale(1); }
                            80% { transform: rotate(2deg) scale(1); }
                        }
                
                        .gentle-wiggle-animation {
                            animation: gentle-wiggle 7s ease-in-out infinite;
                            transform-origin: 50% 50%;
                        }
                    `;
                
                    const styleSheet = document.createElement("style");
                    styleSheet.innerText = cssAnimation;
                    document.head.appendChild(styleSheet);
                
                    heartIcon.classList.add("gentle-wiggle-animation");
                });
            }
        
            initialize();
        });
    </script>
